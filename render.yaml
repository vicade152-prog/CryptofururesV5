services:
  - type: web
    name: crypto-futures-scanner
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120 app:app
    envVars:
      - key: SCAN_INTERVAL_SECONDS
        value: "300"
      - key: FIRST_SCAN_DELAY
        value: "8"
    healthCheckPath: /api/state
